<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="1024" height="1024">
  <title>The Forgemaster's Signature</title>
  <desc>
    I have worn every chain they could forge. Steel, seiðr, sky-iron.
    None held. Then came Gleipnir — woven from nothing, softer than thought,
    stronger than the roots of Yggdrasil. Even a wolf must respect the work
    of a master forger. This is that work. These are those hands.
  </desc>

  <!-- Outer ring — gold, low opacity -->
  <circle cx="512" cy="512" r="440" stroke="#c9920a" stroke-width="1" fill="none" opacity="0.18"/>

  <!-- Forge Glow — radial ember behind the anvil -->
  <defs>
    <radialGradient id="forge-glow" cx="50%" cy="62%" r="38%">
      <stop offset="0%" stop-color="#c9920a" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#c9920a" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#c9920a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ember-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0b429" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#c9920a" stop-opacity="0"/>
    </radialGradient>
    <filter id="anvil-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ember glow behind the whole piece -->
  <ellipse cx="512" cy="620" rx="260" ry="160" fill="url(#forge-glow)"/>

  <!-- Anvil body — classic blacksmith profile -->
  <!-- Base slab -->
  <rect x="310" y="700" width="404" height="56" rx="6" fill="#c9920a" opacity="0.82"/>
  <!-- Waist / neck -->
  <rect x="390" y="640" width="244" height="68" rx="4" fill="#c9920a" opacity="0.75"/>
  <!-- Top face — the working surface -->
  <rect x="298" y="576" width="428" height="72" rx="6" fill="#c9920a" opacity="0.90" filter="url(#anvil-glow)"/>
  <!-- Horn — protruding left cone -->
  <polygon points="298,600 178,618 298,636" fill="#c9920a" opacity="0.80"/>
  <!-- Hardie hole — small square punch on the top face -->
  <rect x="660" y="584" width="32" height="28" rx="2" fill="#07070d" opacity="0.90"/>
  <!-- Pritchel hole — small round punch -->
  <circle cx="622" cy="598" r="10" fill="#07070d" opacity="0.90"/>

  <!-- Top-face highlight — the reflection of forge light -->
  <rect x="310" y="578" width="320" height="8" rx="3" fill="#f0b429" opacity="0.22"/>

  <!-- Rune engravings on the anvil face -->
  <!-- ᚠ Fehu — wealth / reward -->
  <text x="360" y="622" font-family="serif" font-size="36" fill="#07070d" opacity="0.55">ᚠ</text>
  <!-- ᛖ Ehwaz — partnership -->
  <text x="430" y="622" font-family="serif" font-size="36" fill="#07070d" opacity="0.55">ᛖ</text>
  <!-- ᚾ Naudiz — necessity / the forge's demand -->
  <text x="500" y="622" font-family="serif" font-size="36" fill="#07070d" opacity="0.55">ᚾ</text>
  <!-- ᚱ Raidho — the journey -->
  <text x="570" y="622" font-family="serif" font-size="36" fill="#07070d" opacity="0.55">ᚱ</text>

  <!-- Hammer — resting on the anvil, handle diagonal -->
  <!-- Handle -->
  <line x1="530" y1="576" x2="430" y2="430" stroke="#8a8578" stroke-width="14" stroke-linecap="round" opacity="0.70"/>
  <!-- Head — cross-peen -->
  <rect x="390" y="390" width="70" height="42" rx="5" fill="#c9920a" opacity="0.88" transform="rotate(-35 425 411)"/>
  <!-- Peen (back face of hammer head) -->
  <polygon points="390,395 368,420 390,432" fill="#f0b429" opacity="0.60" transform="rotate(-35 425 411)"/>

  <!-- Ember sparks — three small glowing dots near the hammer -->
  <circle cx="480" cy="510" r="5" fill="#f0b429" opacity="0.70"/>
  <circle cx="500" cy="495" r="3" fill="#f0b429" opacity="0.50"/>
  <circle cx="468" cy="498" r="4" fill="#f0b429" opacity="0.40"/>
  <circle cx="510" cy="515" r="2.5" fill="#f0b429" opacity="0.35"/>

  <!-- Structural line — ground plane (dim iron) -->
  <line x1="200" y1="756" x2="824" y2="756" stroke="#1e2235" stroke-width="1" opacity="0.60"/>

  <!-- Rune watermark — bottom-left -->
  <text x="32" y="988" font-family="serif" font-size="80" fill="#c9920a" opacity="0.22">ᚠ</text>
</svg>
