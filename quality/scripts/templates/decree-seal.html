<!--
  Runic Seal of Quality — HTML Template
  Issued when: 0 hollow tests AND combined line coverage >= 50%
-->
<div class="decree secure">
  <div class="decree-type">Runic Seal of Quality</div>
  <div class="decree-title">ᛉ The Shield Wall Holds ᛉ</div>
  <div class="decree-quote">"{{HEADER_QUOTE}}"</div>

  <div class="decree-verdict">{{VERDICT_QUOTE}}</div>

  <div class="decree-meta">
    <dl><dt>Tests</dt><dd>{{TOTAL_TESTS}}</dd></dl>
    <dl><dt>Files</dt><dd>{{TOTAL_FILES}}</dd></dl>
    <dl><dt>Coverage</dt><dd>{{COVERAGE_PCT}}%</dd></dl>
    <dl><dt>Hollow</dt><dd>0</dd></dl>
  </div>

  <div class="decree-closing">"{{CLOSING_QUOTE}}"</div>

  <div class="decree-seal">
    <!-- Loki SVG seal rendered here -->
  </div>
  <div class="decree-tagline">ᚠᛖᚾᚱᛁᚱ — {{TAGLINE}}</div>
</div>
