# --------------------------------------------------------------------------
# Kubernetes Namespaces — Fenrir Ledger
# Apply after cluster provisioning:
#   kubectl apply -f infrastructure/k8s/namespaces.yaml
# --------------------------------------------------------------------------

---
apiVersion: v1
kind: Namespace
metadata:
  name: fenrir-app
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: application
---
apiVersion: v1
kind: Namespace
metadata:
  name: fenrir-agents
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: agents

---
# --------------------------------------------------------------------------
# Kubernetes Service Accounts — Bound to GCP via Workload Identity
# --------------------------------------------------------------------------

apiVersion: v1
kind: ServiceAccount
metadata:
  name: fenrir-app-sa
  namespace: fenrir-app
  annotations:
    iam.gke.io/gcp-service-account: fenrir-app-workload@fenrir-ledger-prod.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: application

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fenrir-agents-sa
  namespace: fenrir-agents
  annotations:
    iam.gke.io/gcp-service-account: fenrir-agents-workload@fenrir-ledger-prod.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: agents

---
# --------------------------------------------------------------------------
# Resource Quotas — Cap agent namespace to prevent runaway costs
# --------------------------------------------------------------------------

apiVersion: v1
kind: ResourceQuota
metadata:
  name: agents-quota
  namespace: fenrir-agents
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
spec:
  hard:
    pods: "8"
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "16"
    limits.memory: 32Gi

---
# --------------------------------------------------------------------------
# Network Policies — Namespace isolation
# --------------------------------------------------------------------------

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-from-agents
  namespace: fenrir-app
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from within fenrir-app namespace
    - from:
        - podSelector: {}
    # Allow traffic from GKE ingress/gateway
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gke-managed-system
    # Block traffic from fenrir-agents (implicit deny for unlisted namespaces)

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agents-egress-only
  namespace: fenrir-agents
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []  # No inbound traffic to agent pods
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound HTTPS (for API calls, package downloads)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow outbound HTTP
    - to: []
      ports:
        - protocol: TCP
          port: 80
