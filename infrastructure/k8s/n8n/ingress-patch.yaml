# --------------------------------------------------------------------------
# n8n — GCE Ingress (standalone, applied separately from Helm)
#
# Routes marketing.fenrirledger.com → n8n-oauth2-proxy → n8n service.
# All traffic passes through oauth2-proxy (Google OAuth, admin-only) before
# reaching the n8n UI. See oauth2-proxy.yaml for the proxy Deployment.
#
# It uses the shared fenrir-app-ip static IP (same IP used by the main
# Fenrir Ledger app + marketing DNS A-record from issue #1231).
#
# Apply order:
#   kubectl apply -f infrastructure/k8s/n8n/managed-certificate.yaml -n fenrir-analytics
#   kubectl apply -f infrastructure/k8s/n8n/oauth2-proxy.yaml -n fenrir-analytics
#   kubectl apply -f infrastructure/k8s/n8n/ingress-patch.yaml -n fenrir-analytics
#
# Verify:
#   kubectl get ingress -n fenrir-analytics
#   kubectl describe managedcertificate n8n-cert -n fenrir-analytics
#   curl -I https://marketing.fenrirledger.com/   # should redirect to Google OAuth
# --------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: n8n
  namespace: fenrir-analytics
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: analytics
  annotations:
    # Shared static IP — marketing.fenrirledger.com DNS points here (issue #1231)
    kubernetes.io/ingress.global-static-ip-name: "fenrir-app-ip"
    # GKE ManagedCertificate for TLS (see managed-certificate.yaml)
    networking.gke.io/managed-certificates: "n8n-cert"
    # Allow HTTP during cert provisioning; GKE redirects to HTTPS once cert is active
    kubernetes.io/ingress.allow-http: "true"
    # BackendConfig points to oauth2-proxy health check (/ping on port 4180)
    cloud.google.com/backend-config: '{"default":"n8n-backend-config"}'
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: marketing.fenrirledger.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Route to oauth2-proxy — it authenticates via Google OAuth then
                # proxies to http://n8n.fenrir-analytics.svc.cluster.local:80
                name: n8n-oauth2-proxy
                port:
                  number: 4180
---
# --------------------------------------------------------------------------
# BackendConfig — health check for n8n-oauth2-proxy
#
# GCE load balancer probes the oauth2-proxy /ping endpoint (unauthenticated)
# rather than the n8n /healthz, since oauth2-proxy is now the first hop.
# --------------------------------------------------------------------------
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: n8n-backend-config
  namespace: fenrir-analytics
  labels:
    app.kubernetes.io/name: n8n
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: analytics
spec:
  healthCheck:
    checkIntervalSec: 15
    timeoutSec: 5
    healthyThreshold: 1
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /ping
    port: 4180
  timeoutSec: 30
  connectionDraining:
    drainingTimeoutSec: 60
