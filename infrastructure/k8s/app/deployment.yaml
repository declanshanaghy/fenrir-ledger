# --------------------------------------------------------------------------
# Fenrir Ledger — Next.js App Deployment
#
# GKE Autopilot billing is per-pod resource request. Right-sized for
# a Next.js SSR app: 0.5 vCPU / 512Mi memory.
#
# Apply: kubectl apply -f infrastructure/k8s/app/deployment.yaml
# --------------------------------------------------------------------------

apiVersion: apps/v1
kind: Deployment
metadata:
  name: fenrir-app
  namespace: fenrir-app
  labels:
    app.kubernetes.io/name: fenrir-app
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fenrir-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fenrir-app
        app.kubernetes.io/part-of: fenrir-ledger
        app.kubernetes.io/component: frontend
    spec:
      serviceAccountName: fenrir-app-sa
      terminationGracePeriodSeconds: 30
      containers:
        - name: fenrir-app
          # Image tag is replaced by CI/CD pipeline at deploy time
          image: us-central1-docker.pkg.dev/fenrir-ledger-prod/fenrir-images/fenrir-app:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: fenrir-app-secrets
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: REDIS_URL
              value: "redis://redis.fenrir-app.svc.cluster.local:6379"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
          # Readiness: gate traffic until the app is serving
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          # Liveness: restart pod if app becomes unresponsive
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Startup: allow extra time for cold starts
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
