# --------------------------------------------------------------------------
# Fenrir Ledger — Application Secrets Template
#
# IMPORTANT: This is a TEMPLATE file. Do NOT commit actual secret values.
# Actual secrets are managed via GitHub Secrets and injected during CD pipeline
# deployment using `kubectl create secret` with values from GitHub Secrets.
#
# The CD pipeline creates/updates this secret with:
#   kubectl create secret generic fenrir-app-secrets \
#     --namespace=fenrir-app \
#     --from-literal=GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
#     --from-literal=GOOGLE_PICKER_API_KEY=${{ secrets.GOOGLE_PICKER_API_KEY }} \
#     ... \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Application secrets (managed via GitHub Secrets → kubectl):
# --------------------------------------------------------------------------

apiVersion: v1
kind: Secret
metadata:
  name: fenrir-app-secrets
  namespace: fenrir-app
  labels:
    app.kubernetes.io/name: fenrir-app
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # ─── Google OAuth (server-side only) ─────────────────────────────────
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: "PLACEHOLDER"
  GOOGLE_CLIENT_SECRET: "PLACEHOLDER"
  GOOGLE_PICKER_API_KEY: "PLACEHOLDER"

  # ─── Anthropic (server-side only) ────────────────────────────────────
  FENRIR_ANTHROPIC_API_KEY: "PLACEHOLDER"

  # ─── Encryption ──────────────────────────────────────────────────────
  ENTITLEMENT_ENCRYPTION_KEY: "PLACEHOLDER"

  # ─── Application URL ────────────────────────────────────────────────
  APP_BASE_URL: "https://fenrirledger.com"

  # ─── Stripe (server-side only) ──────────────────────────────────────
  STRIPE_SECRET_KEY: "PLACEHOLDER"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "PLACEHOLDER"
  STRIPE_WEBHOOK_SECRET: "PLACEHOLDER"
  STRIPE_PRICE_ID: "PLACEHOLDER"

  # ─── KV Store ───────────────────────────────────────────────────────
  # KV store for entitlement caching (Upstash Redis or GCP Memorystore).
  KV_REST_API_URL: "PLACEHOLDER"
  KV_REST_API_TOKEN: "PLACEHOLDER"

  # ─── Public env vars (set as env, not truly secret) ─────────────────
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
