# --------------------------------------------------------------------------
# Fenrir Ledger — In-Cluster Redis (StatefulSet)
#
# Single-replica Redis 7 Alpine for entitlement and trial state persistence.
# Replaces Vercel KV / Upstash Redis with a self-hosted instance.
#
# Resources: 64Mi/50m requests, 128Mi/100m limits (GKE Autopilot billing).
# Persistence: 1Gi PVC at /data with appendonly mode.
# Access: redis.fenrir-app.svc.cluster.local:6379
#
# Apply: kubectl apply -f infrastructure/k8s/app/redis-statefulset.yaml
# --------------------------------------------------------------------------

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: fenrir-app
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: cache
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: fenrir-ledger
        app.kubernetes.io/component: cache
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "128Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: fenrir-app
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/name: redis
