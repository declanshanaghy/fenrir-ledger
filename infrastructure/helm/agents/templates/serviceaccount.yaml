apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: agent-sandbox
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount }}@{{ .Values.gcpProjectId }}.iam.gserviceaccount.com
