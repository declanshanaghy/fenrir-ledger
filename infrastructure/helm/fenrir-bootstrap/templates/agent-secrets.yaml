---
# Agent secret structure — keys exist for workload binding.
# Real values are populated by the /manage-secrets skill via:
#   helm upgrade fenrir-bootstrap ... --set agentSecrets.anthropicApiKey=<val> ...
# or:
#   kubectl patch secret agent-secrets -n fenrir-agents --type=merge ...
apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: {{ .Values.namespaces.agents }}
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/managed-by: helm
type: Opaque
data:
  anthropic-api-key: {{ .Values.agentSecrets.anthropicApiKey | b64enc | quote }}
  gh-token: {{ .Values.agentSecrets.ghToken | b64enc | quote }}
  claude-oauth-token: {{ .Values.agentSecrets.claudeOauthToken | b64enc | quote }}
