---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.app.name }}
  namespace: {{ .Values.namespaces.app }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccounts.app.gcpServiceAccount }}
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: application
    app.kubernetes.io/managed-by: helm
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccounts.agents.name }}
  namespace: {{ .Values.namespaces.agents }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccounts.agents.gcpServiceAccount }}
  labels:
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: agents
    app.kubernetes.io/managed-by: helm
