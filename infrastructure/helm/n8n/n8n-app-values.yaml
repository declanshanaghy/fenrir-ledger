# --------------------------------------------------------------------------
# n8n Application Helm Values
# Chart: oci://ghcr.io/n8n-io/n8n-helm-chart/n8n (official)
# Namespace: fenrir-marketing
#
# Deploy:
#   helm upgrade --install n8n oci://ghcr.io/n8n-io/n8n-helm-chart/n8n \
#     --version 1.1.0 \
#     -n fenrir-marketing \
#     -f infrastructure/helm/n8n/n8n-app-values.yaml
# --------------------------------------------------------------------------

# Standalone mode (no queue, no Redis, no external Postgres)
queueMode:
  enabled: false

# SQLite database (standalone mode)
database:
  type: sqlite
  useExternal: false

# Redis not needed in standalone mode
redis:
  enabled: false
  useExternal: false

# n8n configuration
# config.timezone and config.extraEnv are the chart-native fields.
# Other flat keys (N8N_HOST, etc.) are NOT processed by the chart template —
# they were historically injected via secretRefs. See secretRefs section below.
config:
  timezone: UTC
  # config.extraEnv injects env vars into the n8n main container.
  # N8N_EDITOR_BASE_URL and WEBHOOK_URL fix the OAuth redirect URL so n8n
  # does NOT append the internal port (:5678). Without these, n8n generates:
  #   https://marketing.fenrirledger.com:5678/rest/oauth2-credential/callback
  # (unreachable — port 5678 is internal only, ingress terminates on 443).
  extraEnv:
    - name: N8N_PUBLIC_API_DISABLED
      value: "false"
    - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
      value: "false"
    - name: N8N_EDITOR_BASE_URL
      value: "https://marketing.fenrirledger.com/"
    - name: WEBHOOK_URL
      value: "https://marketing.fenrirledger.com/"
    - name: N8N_API_KEY
      valueFrom:
        secretKeyRef:
          name: n8n-secrets
          key: N8N_API_KEY
    - name: IGNORED_SUBREDDITS
      valueFrom:
        configMapKeyRef:
          name: n8n-workflow-config
          key: IGNORED_SUBREDDITS

# Secrets from K8s secret. Only N8N_ENCRYPTION_KEY comes from the secret.
# Host/port/protocol are set via config (not secrets — they're not sensitive).
secretRefs:
  existingSecret: "n8n-secrets"
  env:
    N8N_ENCRYPTION_KEY: "n8n-encryption-key-placeholder"

# Persistence for SQLite data
# storageClassName: standard-rwo-retain — reclaimPolicy=Retain prevents data
# loss if the PVC or namespace is deleted (issue #1338). The StorageClass is
# created by infrastructure/helm/n8n/templates/storageclass.yaml.
persistence:
  enabled: true
  accessModes: ["ReadWriteOnce"]
  size: 1Gi
  storageClassName: standard-rwo

# Resources
resources:
  main:
    requests:
      cpu: "250m"
      memory: "512Mi"
      ephemeral-storage: "128Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
      ephemeral-storage: "256Mi"

# Service
service:
  type: ClusterIP
  port: 5678

# Ingress managed by n8n-infra Helm chart (infrastructure/helm/n8n/)
ingress:
  enabled: false

# Task runners — external sidecar that executes Code nodes.
# Without this, Code nodes fail: "Task request timed out after 60 seconds".
taskRunners:
  enabled: true
  mode: external

# Image
image:
  repository: docker.n8n.io/n8nio/n8n
  tag: "2.11.2"
  pullPolicy: IfNotPresent
