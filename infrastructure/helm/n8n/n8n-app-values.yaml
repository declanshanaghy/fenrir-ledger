# --------------------------------------------------------------------------
# n8n Application Helm Values
# Chart: oci://ghcr.io/n8n-io/n8n-helm-chart/n8n (official)
# Namespace: fenrir-marketing
#
# Deploy:
#   helm upgrade --install n8n oci://ghcr.io/n8n-io/n8n-helm-chart/n8n \
#     --version 1.1.0 \
#     -n fenrir-marketing \
#     -f infrastructure/helm/n8n/n8n-app-values.yaml
# --------------------------------------------------------------------------

# Standalone mode (no queue, no Redis, no external Postgres)
queueMode:
  enabled: false

# SQLite database (standalone mode)
database:
  type: sqlite
  useExternal: false

# Redis not needed in standalone mode
redis:
  enabled: false
  useExternal: false

# n8n configuration
config:
  timezone: UTC
  N8N_HOST: "marketing.fenrirledger.com"
  N8N_PROTOCOL: "https"
  N8N_PORT: "5678"
  N8N_EDITOR_BASE_URL: "https://marketing.fenrirledger.com/"
  WEBHOOK_URL: "https://marketing.fenrirledger.com/"
  N8N_USER_FOLDER: "/home/node/.n8n"
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_VERSION_NOTIFICATIONS_ENABLED: "false"

# Secrets from K8s secret. Only N8N_ENCRYPTION_KEY comes from the secret.
# Host/port/protocol are set via config (not secrets — they're not sensitive).
secretRefs:
  existingSecret: "n8n-secrets"
  env:
    N8N_ENCRYPTION_KEY: "n8n-encryption-key-placeholder"

# Persistence for SQLite data
persistence:
  enabled: true
  accessModes: ["ReadWriteOnce"]
  size: 1Gi
  storageClassName: standard-rwo

# Resources
resources:
  main:
    requests:
      cpu: "250m"
      memory: "512Mi"
      ephemeral-storage: "128Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"
      ephemeral-storage: "256Mi"

# Service
service:
  type: ClusterIP
  port: 5678

# Ingress managed by n8n-infra Helm chart (infrastructure/helm/n8n/)
ingress:
  enabled: false

# Image
image:
  repository: docker.n8n.io/n8nio/n8n
  tag: "2.11.2"
  pullPolicy: IfNotPresent
