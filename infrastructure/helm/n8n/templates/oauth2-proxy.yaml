---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-oauth2-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: n8n-oauth2-proxy
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: marketing
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: n8n-oauth2-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: n8n-oauth2-proxy
        app.kubernetes.io/part-of: fenrir-ledger
        app.kubernetes.io/component: marketing
    spec:
      terminationGracePeriodSeconds: 30
      volumes:
        - name: oauth2-proxy-emails
          secret:
            secretName: {{ .Values.oauth2Proxy.emailsSecretName }}
            items:
              - key: emails.txt
                path: emails.txt
      containers:
        - name: oauth2-proxy
          image: {{ .Values.oauth2Proxy.image }}
          imagePullPolicy: IfNotPresent
          args:
            - --provider=google
            - --client-id=$(GOOGLE_CLIENT_ID)
            - --client-secret=$(GOOGLE_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
            - --upstream={{ .Values.oauth2Proxy.upstream }}
            - --http-address=0.0.0.0:4180
            - --redirect-url={{ .Values.oauth2Proxy.redirectUrl }}
            - --cookie-domain={{ .Values.oauth2Proxy.cookieDomain }}
            - --cookie-secure=true
            - --cookie-samesite=lax
            - --skip-auth-route=POST=^/webhook/
            - --skip-auth-route=GET=^/webhook/
          ports:
            - name: oauth2-proxy
              containerPort: 4180
              protocol: TCP
          env:
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.secretsSecretName }}
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.secretsSecretName }}
                  key: GOOGLE_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oauth2Proxy.secretsSecretName }}
                  key: OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-proxy-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
          resources: {{ toYaml .Values.oauth2Proxy.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-oauth2-proxy
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: n8n-oauth2-proxy
    app.kubernetes.io/part-of: fenrir-ledger
    app.kubernetes.io/component: marketing
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: n8n-oauth2-proxy
  ports:
    - name: oauth2-proxy
      port: 4180
      targetPort: 4180
      protocol: TCP
