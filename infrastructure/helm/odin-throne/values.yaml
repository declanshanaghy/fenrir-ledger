# --------------------------------------------------------------------------
# Odin's Throne — Helm Chart Default Values
#
# Hono-based real-time agent monitor for Fenrir Ledger.
# Listens on :3001, health at /healthz, WebSocket upgrades supported.
# Override per-environment with values-prod.yaml etc.
# --------------------------------------------------------------------------

namespace: fenrir-monitor

# -- App Deployment --------------------------------------------------------
app:
  replicaCount: 2
  revisionHistoryLimit: 3

  image:
    repository: us-central1-docker.pkg.dev/fenrir-ledger-prod/fenrir-images/odin-throne
    tag: latest
    pullPolicy: IfNotPresent

  serviceAccountName: odin-throne-sa

  env:
    NODE_ENV: "production"
    PORT: "3001"
    K8S_NAMESPACE: "fenrir-agents"
    JOB_LABEL_SELECTOR: "app.kubernetes.io/component=agent-sandbox"

  # K8s secret containing GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET — injected via envFrom.
  # SESSION_SECRET and ALLOWED_EMAIL are no longer used (handled by oauth2-proxy).
  secretRef: "odin-throne-secrets"

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"
      ephemeral-storage: "256Mi"

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  readinessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

  livenessProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /healthz
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 12

# -- UI Deployment ---------------------------------------------------------
ui:
  replicaCount: 2
  revisionHistoryLimit: 3

  image:
    repository: us-central1-docker.pkg.dev/fenrir-ledger-prod/fenrir-images/odin-throne-ui
    tag: latest
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "50m"
      memory: "32Mi"
      ephemeral-storage: "64Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"
      ephemeral-storage: "128Mi"

# -- oauth2-proxy Sidecar --------------------------------------------------
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.6.0
    pullPolicy: IfNotPresent
  port: 4180
  redirectUrl: "https://monitor.fenrirledger.com/oauth2/callback"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
      ephemeral-storage: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"
  # oauth2-proxy secrets are created imperatively by the deploy-odin-throne CI step.
  # They are NOT rendered from values.yaml. See secrets.yaml template for details.

# -- Service (API) ---------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: oauth2-proxy
  containerPort: 3001

# -- Ingress ---------------------------------------------------------------
ingress:
  enabled: true
  className: "gce"
  hosts:
    - monitor.fenrirledger.com
  annotations:
    networking.gke.io/managed-certificates: "odin-throne-cert"
    kubernetes.io/ingress.allow-http: "false"
    kubernetes.io/ingress.global-static-ip-name: "monitor-ip"
    cloud.google.com/backend-config: '{"default":"odin-throne-ui-backend-config"}'

  backendConfig:
    enabled: true
    healthCheck:
      checkIntervalSec: 15
      timeoutSec: 5
      healthyThreshold: 1
      unhealthyThreshold: 3
      type: HTTP
      requestPath: /nginx-health
      port: 80
    timeoutSec: 3600
    connectionDraining:
      drainingTimeoutSec: 15

  managedCertificate:
    enabled: true
    domains:
      - monitor.fenrirledger.com

# -- RBAC ------------------------------------------------------------------
# ServiceAccount with cross-namespace read access to jobs/pods/logs
# in fenrir-agents so the monitor can display agent activity.
rbac:
  enabled: true
  agentsNamespace: fenrir-agents

# -- oauth2-proxy Sidecar (in UI pod) -------------------------------------
# Fronts the nginx UI container. Credentials created imperatively by CI.
oauth2Proxy:
  enabled: true
  image:
    repository: quay.io/oauth2-proxy/oauth2-proxy
    tag: v7.6.0
    pullPolicy: IfNotPresent
  port: 4180
  redirectUrl: "https://monitor.fenrirledger.com/oauth2/callback"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
      ephemeral-storage: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
      ephemeral-storage: "128Mi"
  # oauth2-proxy secrets are created imperatively by the deploy-odin-throne CI step.
  # They are NOT rendered from values.yaml. See secrets.yaml template for details.

# -- Secrets ---------------------------------------------------------------
secrets:
  enabled: false
