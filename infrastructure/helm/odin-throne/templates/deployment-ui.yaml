apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin-throne-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "odin-throne.labels" (dict "component" "monitor-ui") | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  revisionHistoryLimit: {{ .Values.ui.revisionHistoryLimit | default 3 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: odin-throne-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odin-throne-ui
        {{- include "odin-throne.labels" (dict "component" "monitor-ui") | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: odin-throne-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
