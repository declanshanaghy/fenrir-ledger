apiVersion: apps/v1
kind: Deployment
metadata:
  name: odin-throne-ui
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "odin-throne.labels" (dict "component" "monitor-ui") | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  revisionHistoryLimit: {{ .Values.ui.revisionHistoryLimit | default 3 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: odin-throne
      app.kubernetes.io/component: monitor-ui
  template:
    metadata:
      labels:
        {{- include "odin-throne.labels" (dict "component" "monitor-ui") | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 15
      {{- if .Values.oauth2Proxy.enabled }}
      volumes:
        - name: oauth2-proxy-emails
          secret:
            secretName: oauth2-proxy-emails
            items:
              - key: emails.txt
                path: emails.txt
      {{- end }}
      containers:
        - name: odin-throne-ui
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            {{- toYaml .Values.ui.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /nginx-health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
        {{- if .Values.oauth2Proxy.enabled }}
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          args:
            - --provider=google
            - --client-id=$(GOOGLE_CLIENT_ID)
            - --client-secret=$(GOOGLE_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
            - --upstream=http://localhost:80
            - --http-address=0.0.0.0:{{ .Values.oauth2Proxy.port }}
            - --redirect-url={{ .Values.oauth2Proxy.redirectUrl }}
            - --cookie-secure=true
            - --cookie-samesite=lax
          ports:
            - name: oauth2-proxy
              containerPort: {{ .Values.oauth2Proxy.port }}
              protocol: TCP
          env:
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: odin-throne-oauth2-proxy-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: odin-throne-oauth2-proxy-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: odin-throne-oauth2-proxy-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-proxy-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.oauth2Proxy.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.oauth2Proxy.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
        {{- end }}
