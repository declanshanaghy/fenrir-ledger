{{- if .Values.rbac.enabled }}
# ServiceAccount for the Odin's Throne pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.app.serviceAccountName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "odin-throne.labels" (dict "component" "monitor") | nindent 4 }}

---
# Role that grants read+delete access to jobs, pods, and pod logs in the agents namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: odin-throne-agent-reader
  namespace: {{ .Values.rbac.agentsNamespace }}
  labels:
    {{- include "odin-throne.labels" (dict "component" "monitor") | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

---
# Bind the ServiceAccount (in fenrir-monitor) to the Role (in fenrir-agents)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: odin-throne-agent-reader
  namespace: {{ .Values.rbac.agentsNamespace }}
  labels:
    {{- include "odin-throne.labels" (dict "component" "monitor") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: odin-throne-agent-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.app.serviceAccountName }}
    namespace: {{ .Values.namespace }}
{{- end }}
