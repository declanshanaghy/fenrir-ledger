apiVersion: apps/v1
kind: Deployment
metadata:
  name: umami
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "umami.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.umami.replicaCount }}
  revisionHistoryLimit: {{ .Values.umami.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.umami.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "umami.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "umami.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      volumes:
        - name: oauth2-proxy-emails
          secret:
            secretName: oauth2-proxy-emails
            items:
              - key: emails.txt
                path: emails.txt
      containers:
        - name: umami
          image: "{{ .Values.umami.image.repository }}:{{ .Values.umami.image.tag }}"
          imagePullPolicy: {{ .Values.umami.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
          envFrom:
            - secretRef:
                name: umami-secrets
          env:
            - name: DATABASE_TYPE
              value: {{ .Values.umami.env.DATABASE_TYPE | quote }}
            - name: DATABASE_PORT
              value: {{ .Values.umami.env.DATABASE_PORT | quote }}
            - name: DATABASE_NAME
              value: {{ .Values.umami.env.DATABASE_NAME | quote }}
            - name: DATABASE_USER
              value: {{ .Values.umami.env.DATABASE_USER | quote }}
          resources:
            {{- toYaml .Values.umami.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.umami.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.umami.livenessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.umami.startupProbe | nindent 12 }}
        {{- if .Values.oauth2Proxy.enabled }}
        - name: oauth2-proxy
          image: "{{ .Values.oauth2Proxy.image.repository }}:{{ .Values.oauth2Proxy.image.tag }}"
          imagePullPolicy: {{ .Values.oauth2Proxy.image.pullPolicy }}
          args:
            - --provider=google
            - --client-id=$(GOOGLE_CLIENT_ID)
            - --client-secret=$(GOOGLE_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
            - --upstream=http://localhost:{{ .Values.service.containerPort }}
            - --http-address=0.0.0.0:{{ .Values.oauth2Proxy.port }}
            - --redirect-url={{ .Values.oauth2Proxy.redirectUrl }}
            - --skip-auth-route=GET=^/script\.js$
            - --skip-auth-route=POST=^/api/send$
            - --skip-auth-route=OPTIONS=^/api/send$
            - --cookie-secure=true
            - --cookie-samesite=lax
          ports:
            - name: oauth2-proxy
              containerPort: {{ .Values.oauth2Proxy.port }}
              protocol: TCP
          env:
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: umami-oauth2-proxy-secrets
                  key: GOOGLE_CLIENT_ID
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: umami-oauth2-proxy-secrets
                  key: GOOGLE_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: umami-oauth2-proxy-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          volumeMounts:
            - name: oauth2-proxy-emails
              mountPath: /etc/oauth2-proxy
              readOnly: true
          resources:
            {{- toYaml .Values.oauth2Proxy.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.oauth2Proxy.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: {{ .Values.oauth2Proxy.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
        {{- end }}
