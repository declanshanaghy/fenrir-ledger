{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: umami-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "umami.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
  APP_SECRET: {{ .Values.secrets.appSecret | b64enc | quote }}
{{- end }}
