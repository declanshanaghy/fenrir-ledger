{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: umami-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "umami.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
  APP_SECRET: {{ .Values.secrets.appSecret | b64enc | quote }}
{{- end }}
{{- if .Values.oauth2Proxy.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: umami-oauth2-proxy-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "umami.labels" . | nindent 4 }}
  annotations:
    # GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET are copied from odin-throne-secrets
    # in fenrir-monitor namespace (same OAuth client reused for Umami).
    # OAUTH2_PROXY_COOKIE_SECRET must be a 32-byte random hex string.
    # Generate with: openssl rand -hex 16
    # All three values are injected via GitHub Actions / helm --set at deploy time.
    # emails.txt lists the single allowed Google account (one email per line).
    helm.sh/resource-policy: keep
type: Opaque
data:
  GOOGLE_CLIENT_ID: {{ .Values.oauth2Proxy.secrets.googleClientId | b64enc | quote }}
  GOOGLE_CLIENT_SECRET: {{ .Values.oauth2Proxy.secrets.googleClientSecret | b64enc | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ .Values.oauth2Proxy.secrets.cookieSecret | b64enc | quote }}
  emails.txt: {{ .Values.oauth2Proxy.secrets.allowedEmails | b64enc | quote }}
{{- end }}
