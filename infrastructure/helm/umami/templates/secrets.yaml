{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: umami-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "umami.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ .Values.secrets.databaseUrl | b64enc | quote }}
  DATABASE_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.env.POSTGRES_PASSWORD | b64enc | quote }}
  APP_SECRET: {{ .Values.secrets.appSecret | b64enc | quote }}
{{- end }}
{{- /*
  NOTE: umami-oauth2-proxy-secrets is NOT rendered by this Helm template.
  It is created imperatively by the deploy-umami CI step using GitHub Actions secrets.
  Rendering it here would overwrite the K8s secret with placeholder values from
  values.yaml on every `helm upgrade`, breaking oauth2-proxy.

  Required keys: GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET, OAUTH2_PROXY_COOKIE_SECRET,
  emails.txt (one email per line).

  OAUTH2_PROXY_COOKIE_SECRET MUST be exactly 16, 24, or 32 bytes.
  Generate with: openssl rand -hex 16   (produces 32 ASCII hex chars = 32 bytes)
*/ -}}
