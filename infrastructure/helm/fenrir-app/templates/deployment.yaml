apiVersion: apps/v1
kind: Deployment
metadata:
  name: fenrir-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fenrir-app.labels" (dict "name" "fenrir-app" "component" "ledger") | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicaCount }}
  revisionHistoryLimit: {{ .Values.app.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.app.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "fenrir-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fenrir-app.labels" (dict "name" "fenrir-app" "component" "ledger") | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.app.serviceAccountName }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: fenrir-app
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: fenrir-app-secrets
          env:
            {{- range $key, $value := .Values.app.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.app.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.app.livenessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.app.startupProbe | nindent 12 }}
