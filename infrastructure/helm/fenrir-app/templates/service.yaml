apiVersion: v1
kind: Service
metadata:
  name: fenrir-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fenrir-app.labels" (dict "name" "fenrir-app" "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "fenrir-app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
