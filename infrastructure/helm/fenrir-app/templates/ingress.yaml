{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fenrir-app
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fenrir-app.labels" (dict "name" "fenrir-app" "component" "ledger") | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  defaultBackend:
    service:
      name: fenrir-app
      port:
        number: {{ .Values.service.port }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fenrir-app
                port:
                  number: {{ $.Values.service.port }}
    {{- end }}
---
{{- if .Values.ingress.managedCertificate.enabled }}
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: fenrir-app-cert
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fenrir-app.labels" (dict "name" "fenrir-app" "component" "ledger") | nindent 4 }}
spec:
  domains:
    {{- range .Values.ingress.managedCertificate.domains }}
    - {{ . }}
    {{- end }}
{{- end }}
---
{{- if .Values.ingress.backendConfig.enabled }}
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: fenrir-app-backend-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fenrir-app.labels" (dict "name" "fenrir-app" "component" "ledger") | nindent 4 }}
spec:
  healthCheck:
    {{- toYaml .Values.ingress.backendConfig.healthCheck | nindent 4 }}
  timeoutSec: {{ .Values.ingress.backendConfig.timeoutSec }}
  connectionDraining:
    {{- toYaml .Values.ingress.backendConfig.connectionDraining | nindent 4 }}
  {{- if .Values.ingress.backendConfig.cdn.enabled }}
  cdn:
    enabled: true
    cachePolicy:
      includeHost: {{ .Values.ingress.backendConfig.cdn.cachePolicy.includeHost }}
      includeProtocol: {{ .Values.ingress.backendConfig.cdn.cachePolicy.includeProtocol }}
      includeQueryString: {{ .Values.ingress.backendConfig.cdn.cachePolicy.includeQueryString }}
    cacheMode: {{ .Values.ingress.backendConfig.cdn.cacheMode }}
  {{- end }}
{{- end }}
{{- end }}
