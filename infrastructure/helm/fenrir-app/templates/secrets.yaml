{{- if .Values.secrets.enabled }}
# Template only — actual secrets are created by the CD pipeline via kubectl.
apiVersion: v1
kind: Secret
metadata:
  name: fenrir-app-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fenrir-app.labels" (dict "name" "fenrir-app" "component" "secrets") | nindent 4 }}
type: Opaque
stringData:
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: "PLACEHOLDER"
  GOOGLE_CLIENT_SECRET: "PLACEHOLDER"
  GOOGLE_PICKER_API_KEY: "PLACEHOLDER"
  FENRIR_ANTHROPIC_API_KEY: "PLACEHOLDER"
  ENTITLEMENT_ENCRYPTION_KEY: "PLACEHOLDER"
  APP_BASE_URL: {{ .Values.secrets.appBaseUrl | quote }}
  STRIPE_SECRET_KEY: "PLACEHOLDER"
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "PLACEHOLDER"
  STRIPE_WEBHOOK_SECRET: "PLACEHOLDER"
  STRIPE_PRICE_ID: "PLACEHOLDER"
  KV_REST_API_URL: "PLACEHOLDER"
  KV_REST_API_TOKEN: "PLACEHOLDER"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
  # KMS envelope encryption — ciphertext is base64-encoded output of:
  #   gcloud kms encrypt --keyring=fenrir-keys --key=fenrir-envelope \
  #     --location=us-central1 --plaintext-file=- --ciphertext-file=-
  # Update via: node scripts/sync-secrets.mjs --push FENRIR_JWT_SECRET
  FENRIR_JWT_SECRET_CIPHERTEXT: "PLACEHOLDER"
{{- end }}
