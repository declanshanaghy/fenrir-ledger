name: Playwright Tests — Vercel Preview

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      preview_url:
        description: 'Preview URL to test against'
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright:
    if: >-
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment != 'Production') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: development/frontend/package-lock.json

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('development/frontend/package-lock.json') }}

      - name: Resolve preview URL
        id: url
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "preview_url=${{ inputs.preview_url }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "preview_url=${{ github.event.deployment_status.environment_url }}" >> "$GITHUB_OUTPUT"
            echo "branch=${{ github.event.deployment.ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: development/frontend
        run: npm ci
        timeout-minutes: 5

      - name: Install Playwright browsers
        working-directory: development/frontend
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5

      - name: Install Playwright browser deps (cached)
        working-directory: development/frontend
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 2

      - name: TypeScript check
        id: tsc
        run: bash quality/scripts/verify.sh --step tsc

      - name: Unit tests
        id: unit
        run: bash quality/scripts/verify.sh --step unit

      - name: E2E tests (Playwright)
        id: e2e
        env:
          SERVER_URL: ${{ steps.url.outputs.preview_url }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          CI: "true"
          NODE_PATH: ./development/frontend/node_modules
        run: bash quality/scripts/verify.sh --step e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: development/frontend/playwright-report/
          retention-days: 14

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.url.outputs.preview_url }}
          BRANCH_NAME: ${{ steps.url.outputs.branch }}
          TSC_OUTCOME: ${{ steps.tsc.outcome }}
          UNIT_OUTCOME: ${{ steps.unit.outcome }}
          E2E_OUTCOME: ${{ steps.e2e.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${process.env.BRANCH_NAME}`,
              state: 'open',
            });

            if (pulls.length === 0) {
              core.info('No open PR found for this branch — skipping comment.');
              return;
            }

            const prNumber = pulls[0].number;

            // Use the plain preview URL — never append secrets to public PR comments.
            const previewUrl = process.env.PREVIEW_URL || '';

            const runUrl = process.env.RUN_URL;

            const stepLine = (label, outcome) => {
              if (outcome === 'success') return `✅ ${label} passed`;
              if (outcome === 'failure') return `❌ ${label} failed — [view run](${runUrl})`;
              if (outcome === 'skipped') return `⏭️ ${label} skipped`;
              return `⚠️ ${label} did not run`;
            };

            const deployLine = previewUrl
              ? `🔍 **Preview URL:** ${previewUrl}`
              : '❌ **Deployment failed** — no preview URL';

            const body = [
              '## Vercel Preview',
              '',
              deployLine,
              '',
              '### CI Checks',
              stepLine('TypeScript', process.env.TSC_OUTCOME),
              stepLine('Unit tests', process.env.UNIT_OUTCOME),
              stepLine('E2E tests (Playwright)', process.env.E2E_OUTCOME),
              '',
              `_Updated on push to \`${process.env.BRANCH_NAME}\`_`,
            ].join('\n');

            // Upsert the bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.startsWith('## Vercel Preview'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing preview comment (id ${existing.id}) on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created new preview comment on PR #${prNumber}`);
            }
