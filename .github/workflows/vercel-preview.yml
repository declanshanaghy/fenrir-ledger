name: Deploy to Vercel — Preview

on:
  push:
    branches-ignore: [main]
    paths:
      - 'development/frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Detect ephemeral backend
        id: backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find PR number for this branch
          PR_NUMBER=$(gh pr list --repo "${{ github.repository }}" --head "${{ github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found — skipping ephemeral backend detection"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          APP_NAME="fenrir-backend-pr-${PR_NUMBER}"
          echo "Looking for ephemeral app: $APP_NAME"

          # Retry loop — the fly-preview workflow may still be deploying
          for attempt in $(seq 1 5); do
            if flyctl apps list --json | jq -e ".[] | select(.Name == \"$APP_NAME\")" > /dev/null 2>&1; then
              BACKEND_URL="https://${APP_NAME}.fly.dev"
              if curl -sf "${BACKEND_URL}/health" > /dev/null 2>&1; then
                echo "Ephemeral backend found and healthy: $BACKEND_URL"
                echo "found=true" >> "$GITHUB_OUTPUT"
                echo "url=$BACKEND_URL" >> "$GITHUB_OUTPUT"
                echo "ws_url=wss://${APP_NAME}.fly.dev" >> "$GITHUB_OUTPUT"
                echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
                exit 0
              else
                echo "App exists but health check failed (attempt $attempt/5)"
              fi
            else
              echo "App $APP_NAME not found (attempt $attempt/5)"
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "Retrying in 30s..."
              sleep 30
            fi
          done

          echo "No healthy ephemeral backend found after 5 attempts"
          echo "found=false" >> "$GITHUB_OUTPUT"

      - name: Override backend env for ephemeral preview
        if: steps.backend.outputs.found == 'true'
        run: |
          echo "" >> .vercel/.env.preview.local
          echo "NEXT_PUBLIC_BACKEND_WS_URL=${{ steps.backend.outputs.ws_url }}" >> .vercel/.env.preview.local
          echo "BACKEND_URL=${{ steps.backend.outputs.url }}" >> .vercel/.env.preview.local
          echo "Wired preview to ephemeral backend: ${{ steps.backend.outputs.url }}"

      - name: Copy static site into Next.js public/
        run: |
          rm -rf development/frontend/public/static development/frontend/public/sessions
          mkdir -p development/frontend/public/static development/frontend/public/sessions
          cp -r static/. development/frontend/public/static/
          cp -r sessions/. development/frontend/public/sessions/

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy and capture preview URL
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Install Playwright browsers
        working-directory: development/frontend
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run Playwright tests against preview
        id: playwright
        working-directory: development/frontend
        env:
          SERVER_URL: ${{ steps.deploy.outputs.preview_url }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          CI: "true"
          NODE_PATH: ./node_modules
        run: npx playwright test --config playwright.config.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_id }}
          path: development/frontend/playwright-report/
          retention-days: 14

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          BRANCH_NAME: ${{ github.ref_name }}
          PLAYWRIGHT_OUTCOME: ${{ steps.playwright.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BACKEND_FOUND: ${{ steps.backend.outputs.found }}
          BACKEND_URL: ${{ steps.backend.outputs.url }}
          BACKEND_APP_NAME: ${{ steps.backend.outputs.app_name }}
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${process.env.BRANCH_NAME}`,
              state: 'open',
            });

            if (pulls.length === 0) {
              core.info('No open PR found for this branch — skipping comment.');
              return;
            }

            const prNumber = pulls[0].number;

            // Use the plain preview URL — never append secrets to public PR comments.
            const previewUrl = process.env.PREVIEW_URL || '';

            // Build test result line
            const outcome = process.env.PLAYWRIGHT_OUTCOME;
            const runUrl = process.env.RUN_URL;
            const testLine = outcome === 'success'
              ? '✅ All Playwright tests passed'
              : outcome === 'failure'
                ? `❌ Playwright tests failed — [view report](${runUrl})`
                : outcome === 'skipped'
                  ? '⏭️ Playwright tests skipped (deploy did not complete)'
                  : '⚠️ Playwright tests did not run';

            const deployLine = previewUrl
              ? `🔍 **Preview URL:** ${previewUrl}`
              : '❌ **Deployment failed** — no preview URL';

            // Backend info
            const backendFound = process.env.BACKEND_FOUND === 'true';
            const backendUrl = process.env.BACKEND_URL;
            const backendAppName = process.env.BACKEND_APP_NAME;
            const backendLine = backendFound
              ? `🔗 **Backend:** [${backendAppName}](${backendUrl}/health) (ephemeral)`
              : '🔗 **Backend:** production';

            const body = [
              '## Vercel Preview',
              '',
              deployLine,
              backendLine,
              '',
              '### Playwright Tests',
              testLine,
              '',
              `_Updated on push to \`${process.env.BRANCH_NAME}\`_`,
            ].join('\n');

            // Upsert the bot comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.startsWith('## Vercel Preview'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing preview comment (id ${existing.id}) on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created new preview comment on PR #${prNumber}`);
            }
