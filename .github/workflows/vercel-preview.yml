name: Deploy to Vercel — Preview

on:
  push:
    branches-ignore: [main]
    paths:
      - 'development/src/**'
      - 'static/**'
      - 'sessions/**'
      - '.github/workflows/**'
      - 'vercel.json'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Copy static site into Next.js public/
        run: |
          rm -rf development/src/public/static development/src/public/sessions
          mkdir -p development/src/public/static development/src/public/sessions
          cp -r static/. development/src/public/static/
          cp -r sessions/. development/src/public/sessions/

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy and capture preview URL
        id: deploy
        run: |
          PREVIEW_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment with preview URL
        if: success()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          script: |
            // Find the open PR for this branch, if any
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${process.env.BRANCH_NAME}`,
              state: 'open',
            });

            if (pulls.length === 0) {
              core.info('No open PR found for this branch — skipping comment.');
              return;
            }

            const prNumber = pulls[0].number;
            const body = [
              '## Vercel Preview',
              '',
              `🔍 **Preview URL:** ${process.env.PREVIEW_URL}`,
              '',
              `_Updated on push to \`${process.env.BRANCH_NAME}\`_`,
            ].join('\n');

            // Check for an existing bot comment to update rather than create a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.startsWith('## Vercel Preview'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated existing preview comment (id ${existing.id}) on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created new preview comment on PR #${prNumber}`);
            }
