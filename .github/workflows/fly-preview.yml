name: Deploy Backend Preview to Fly.io

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'development/backend/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      APP_NAME: fenrir-backend-pr-${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly app if not exists
        run: |
          if ! flyctl apps list --json | jq -e ".[] | select(.Name == \"$APP_NAME\")" > /dev/null 2>&1; then
            flyctl apps create "$APP_NAME" --org personal
            echo "Created app $APP_NAME"
          else
            echo "App $APP_NAME already exists"
          fi

      - name: Set secrets on ephemeral app
        run: |
          flyctl secrets set \
            ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            LLM_PROVIDER="${{ secrets.LLM_PROVIDER }}" \
            --app "$APP_NAME"

      - name: Deploy to Fly.io
        working-directory: development/backend
        run: |
          sed -i "s/^app = .*/app = \"$APP_NAME\"/" fly.toml
          flyctl deploy --local-only

      - name: Health check
        run: |
          URL="https://${APP_NAME}.fly.dev/health"
          for i in $(seq 1 30); do
            if curl -sf "$URL" > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i/30 — waiting 2s..."
            sleep 2
          done
          echo "Health check failed after 30 attempts"
          exit 1

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          APP_NAME: fenrir-backend-pr-${{ github.event.pull_request.number }}
        with:
          script: |
            const appName = process.env.APP_NAME;
            const baseUrl = `https://${appName}.fly.dev`;
            const prNumber = context.payload.pull_request.number;

            const body = [
              '## Backend Preview (Fly.io)',
              '',
              `🚀 **Backend URL:** ${baseUrl}`,
              `❤️ [Health check](${baseUrl}/health) · 📖 [API docs](${baseUrl}/docs)`,
              '',
              `_Ephemeral app \`${appName}\` — auto-destroyed on PR close_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const marker = '## Backend Preview (Fly.io)';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated preview comment (id ${existing.id}) on PR #${prNumber}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Created backend preview comment on PR #${prNumber}`);
            }
