name: Deploy to Vercel — Production

on:
  push:
    branches: [main]
    paths:
      - 'development/src/**'
      - 'static/**'
      - 'sessions/**'
      - '.github/workflows/**'
      - 'vercel.json'
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Copy static site into Next.js public/
        run: |
          rm -rf development/src/public/static development/src/public/sessions
          mkdir -p development/src/public/static development/src/public/sessions
          cp -r static/. development/src/public/static/
          cp -r sessions/. development/src/public/sessions/

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
