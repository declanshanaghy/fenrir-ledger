# --------------------------------------------------------------------------
# CI Tests — TypeScript Check + Unit Tests + Playwright E2E against GKE Prod
#
# Runs on every push to PR branches and workflow_dispatch:
#   1. TypeScript type-checking (pnpm run verify:tsc)
#   2. Vitest unit tests (pnpm run verify:unit)
#   3. Playwright E2E tests against https://www.fenrirledger.com
#   4. Upload test artifacts + upsert PR comment with results
#   5. odins-spear verify (tsc + unit) when development/odins-spear/** changes
#
# Replaces the former Vercel-deployment-based CI workflow (Issue #734).
#
# Required GitHub Secrets:
#   (none — tests run against the public GKE prod endpoint)
# --------------------------------------------------------------------------

name: CI Tests

concurrency:
  group: ci-tests-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches-ignore: [main]
    paths:
      - "development/frontend/**"
      - "development/odins-spear/**"
      - "quality/test-suites/**"
      - ".github/workflows/ci-tests.yml"
  workflow_dispatch:

jobs:
  ci:
    name: TypeScript + Unit + E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        id: tsc
        working-directory: development/frontend
        run: pnpm run verify:tsc

      - name: Run unit tests
        id: unit
        working-directory: development/frontend
        run: pnpm run verify:unit

      - name: Install Playwright browsers
        working-directory: development/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        id: e2e
        working-directory: development/frontend
        env:
          SERVER_URL: https://www.fenrirledger.com
        run: pnpm run verify:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: development/frontend/playwright-report/
          retention-days: 14

      - name: Upsert PR comment with CI results
        if: always() && github.event_name == 'push'
        # Fine-grained PAT is sufficient for PR comment writes (pull-requests: write)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN_PAT_FINE_GRAINED }}
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.sha;
            const branch = context.ref.replace('refs/heads/', '');

            // Find open PR for this branch
            const pulls = await github.rest.pulls.list({
              owner, repo,
              head: `${owner}:${branch}`,
              state: 'open',
            });

            if (pulls.data.length === 0) return;

            const prNumber = pulls.data[0].number;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const marker = '<!-- ci-tests-comment -->';

            const body = [
              marker,
              `## ${status} CI Results`,
              '',
              `| Check | Status |`,
              `|-------|--------|`,
              `| TypeScript | ${'${{ steps.tsc.outcome }}' || '—'} |`,
              `| Unit Tests | ${'${{ steps.unit.outcome }}' || '—'} |`,
              `| E2E Tests  | ${'${{ steps.e2e.outcome }}' || '—'} |`,
              '',
              `**Commit:** \`${sha.slice(0, 7)}\``,
              `**Run:** [View details](${runUrl})`,
              `**Target:** https://www.fenrirledger.com`,
            ].join('\n');

            // Upsert: find existing comment or create new
            const comments = await github.rest.issues.listComments({
              owner, repo,
              issue_number: prNumber,
            });
            const existing = comments.data.find(c => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body,
              });
            }

  odins-spear-ci:
    name: Odin's Spear — TypeScript + Unit
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(toJSON(github.event.commits.*.modified), 'development/odins-spear') ||
      contains(toJSON(github.event.commits.*.added), 'development/odins-spear')
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify odins-spear
        working-directory: development/odins-spear
        run: pnpm run verify
