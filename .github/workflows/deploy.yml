# --------------------------------------------------------------------------
# Unified CI/CD Pipeline — Terraform + Build + Deploy to GKE Autopilot
#
# Runs on every push to main:
#   1. Terraform init/plan/apply (idempotent — no-ops if nothing changed)
#   2. Docker build & push to Google Artifact Registry
#   3. Rolling deployment to GKE Autopilot (zero-downtime)
#   4. Post-deploy health check against /api/health
#
# Required GitHub Secrets:
#   GCP_PROJECT_ID              — Google Cloud project ID
#   GCP_SA_KEY                  — Base64-encoded service account JSON key
#   GCP_REGION                  — GCP region (e.g. us-central1)
#   GCP_ZONE                    — GCP zone (e.g. us-central1-a, used by Terraform)
#   GCP_REGION                  — GCP region (e.g. us-central1, used by GKE)
#   GKE_CLUSTER_NAME            — GKE cluster name (e.g. fenrir-autopilot)
#   GOOGLE_CLIENT_SECRET        — OAuth client secret
#   NEXT_PUBLIC_GOOGLE_CLIENT_ID — OAuth client ID
#   GOOGLE_PICKER_API_KEY       — Google Picker API key
#   FENRIR_ANTHROPIC_API_KEY    — Anthropic API key
#   ENTITLEMENT_ENCRYPTION_KEY  — AES-256 encryption key
#   STRIPE_SECRET_KEY           — Stripe secret key
#   NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY — Stripe publishable key
#   STRIPE_WEBHOOK_SECRET       — Stripe webhook signing secret
#   STRIPE_PRICE_ID             — Stripe price ID
#   KV_REST_API_URL             — KV store REST API URL
#   KV_REST_API_TOKEN           — KV store REST API token
#   TF_VAR_BILLING_ACCOUNT_ID   — GCP billing account ID for Terraform
# --------------------------------------------------------------------------

name: Deploy to GKE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Custom image tag (default: git SHA)"
        required: false
        type: string
      skip_deploy:
        description: "Build only — skip K8s deployment"
        required: false
        type: boolean
        default: false
      skip_terraform:
        description: "Skip Terraform plan/apply"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fenrir-images
  IMAGE_NAME: fenrir-app
  IMAGE_TAG: ${{ inputs.image_tag || github.sha }}

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Terraform — ensure GKE infrastructure is up to date
  # --------------------------------------------------------------------------
  terraform:
    name: Terraform Plan & Apply
    if: ${{ !inputs.skip_terraform }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
          TF_VAR_zone: ${{ secrets.GCP_ZONE }}
          TF_VAR_billing_account_id: ${{ secrets.TF_VAR_BILLING_ACCOUNT_ID }}

      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Terraform Output Summary
        run: |
          echo "### Terraform Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output -no-color >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 2: Build Docker image & push to Artifact Registry
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    needs: terraform
    if: always() && (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      full_image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_BUILD_ID=${{ github.sha }}
            NEXT_PUBLIC_APP_VERSION=${{ github.sha }}

      - name: Output image details
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Registry:** \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 3: Deploy to GKE Autopilot with rolling update
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to GKE
    needs: build-and-push
    if: ${{ !inputs.skip_deploy }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Ensure namespaces and service accounts exist
        run: |
          kubectl create namespace fenrir-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create serviceaccount fenrir-app-sa \
            --namespace=fenrir-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl annotate serviceaccount fenrir-app-sa \
            --namespace=fenrir-app --overwrite \
            iam.gke.io/gcp-service-account=fenrir-app-workload@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Create/update K8s secrets
        run: |
          kubectl create secret generic fenrir-app-secrets \
            --namespace=fenrir-app \
            --from-literal=NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=GOOGLE_PICKER_API_KEY="${{ secrets.GOOGLE_PICKER_API_KEY }}" \
            --from-literal=FENRIR_ANTHROPIC_API_KEY="${{ secrets.FENRIR_ANTHROPIC_API_KEY }}" \
            --from-literal=ENTITLEMENT_ENCRYPTION_KEY="${{ secrets.ENTITLEMENT_ENCRYPTION_KEY }}" \
            --from-literal=APP_BASE_URL="https://fenrirledger.com" \
            --from-literal=STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}" \
            --from-literal=NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY="${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}" \
            --from-literal=STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}" \
            --from-literal=STRIPE_PRICE_ID="${{ secrets.STRIPE_PRICE_ID }}" \
            --from-literal=KV_REST_API_URL="${{ secrets.KV_REST_API_URL }}" \
            --from-literal=KV_REST_API_TOKEN="${{ secrets.KV_REST_API_TOKEN }}" \
            --from-literal=NEXT_PUBLIC_APP_VERSION="${{ github.sha }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply K8s manifests
        run: |
          kubectl apply -f infrastructure/k8s/app/deployment.yaml
          kubectl apply -f infrastructure/k8s/app/service.yaml
          kubectl apply -f infrastructure/k8s/app/ingress.yaml

      - name: Update deployment image
        run: |
          kubectl set image deployment/fenrir-app \
            fenrir-app=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            --namespace=fenrir-app

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fenrir-app \
            --namespace=fenrir-app \
            --timeout=300s

      - name: Verify deployment
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Pod Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n fenrir-app -l app.kubernetes.io/name=fenrir-app >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Service Endpoints" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n fenrir-app >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Ingress" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n fenrir-app >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # --------------------------------------------------------------------------
  # Job 4: Post-deploy health check
  # --------------------------------------------------------------------------
  health-check:
    name: Post-Deploy Health Check
    needs: deploy
    if: ${{ !inputs.skip_deploy }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Health check via Ingress
        run: |
          INGRESS_IP=$(kubectl get ingress fenrir-app -n fenrir-app \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")

          if [ -n "$INGRESS_IP" ]; then
            echo "Checking health at http://$INGRESS_IP/api/health"
            RETRIES=5
            for i in $(seq 1 $RETRIES); do
              if curl -sf --max-time 10 "http://$INGRESS_IP/api/health"; then
                echo ""
                echo "Health check passed on attempt $i"
                echo "### Health Check Passed" >> $GITHUB_STEP_SUMMARY
                exit 0
              fi
              echo "Attempt $i/$RETRIES failed, retrying in 15s..."
              sleep 15
            done
            echo "::warning::Health check failed after $RETRIES attempts (may need DNS/SSL propagation)"
            echo "### Health Check Warning" >> $GITHUB_STEP_SUMMARY
            echo "Health check did not pass after $RETRIES attempts. This may be expected if SSL is still provisioning." >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::Ingress external IP not yet assigned. SSL certificate provisioning may take 15-60 minutes."
            echo "### Health Check Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Ingress IP not yet available. SSL provisioning may still be in progress." >> $GITHUB_STEP_SUMMARY
          fi
