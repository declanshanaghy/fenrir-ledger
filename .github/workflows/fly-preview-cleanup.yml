name: Cleanup Backend Preview on Fly.io

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy ephemeral Fly app if exists
        run: |
          APP_NAME="fenrir-backend-pr-${{ github.event.pull_request.number }}"
          if flyctl apps list --json | jq -e ".[] | select(.Name == \"$APP_NAME\")" > /dev/null 2>&1; then
            flyctl apps destroy "$APP_NAME" --yes
            echo "Destroyed app $APP_NAME"
          else
            echo "No app $APP_NAME found — nothing to clean up"
          fi
