name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'development/frontend/public/static/**'
      - 'sessions/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build combined artifact
        run: |
          mkdir -p _site
          # Marketing site at root
          cp -r development/frontend/public/static/. _site/
          # Session archive at /sessions/
          mkdir -p _site/sessions
          cp -r sessions/. _site/sessions/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
